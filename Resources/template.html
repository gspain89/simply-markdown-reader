<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="vendor/hljs-light.css" id="hljs-light-theme">
<link rel="stylesheet" href="vendor/hljs-dark.css" id="hljs-dark-theme" disabled>
<script src="vendor/marked.min.js"></script>
<script src="vendor/highlight.min.js"></script>
<script src="vendor/mermaid.min.js"></script>
<link rel="stylesheet" href="vendor/katex.min.css">
<script src="vendor/katex.min.js"></script>
<script src="vendor/auto-render.min.js"></script>
</head>
<body>
    <div id="progress-bar" class="progress-bar"></div>

    <!-- Top bar: breadcrumb + toolbar -->
    <div id="top-bar" class="top-bar">
        <div id="breadcrumb" class="breadcrumb-path"></div>
        <div class="toolbar">
            <button class="tb-btn" id="btn-zoom-out" onclick="changeFontSizeFromToolbar(-1)" title="Zoom Out (⌘-)">
                <svg viewBox="0 0 16 16"><text x="50%" y="58%" text-anchor="middle" dominant-baseline="central" fill="currentColor" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">A</text></svg>
            </button>
            <span class="tb-font-size" id="tb-font-size" onclick="toggleFontSizeDropdown(event)">16px<div class="font-size-dropdown" id="font-size-dropdown"></div></span>
            <button class="tb-btn" id="btn-zoom-in" onclick="changeFontSizeFromToolbar(1)" title="Zoom In (⌘+)">
                <svg viewBox="0 0 16 16"><text x="50%" y="55%" text-anchor="middle" dominant-baseline="central" fill="currentColor" font-family="-apple-system,sans-serif" font-size="16" font-weight="600">A</text></svg>
            </button>
            <span class="tb-sep"></span>
            <button class="tb-btn" id="btn-bookmark" onclick="sendToSwift('toggleBookmark')" title="Bookmark (⌘D)">
                <svg viewBox="0 0 16 16"><path d="M4,2 L12,2 L12,14 L8,11 L4,14 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
            <button class="tb-btn" id="btn-toc" onclick="toggleTOCFromToolbar()" title="Table of Contents (⌘⇧T)">
                <svg viewBox="0 0 16 16"><line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="2" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
            <button class="tb-btn" id="btn-refresh" onclick="doRefresh()" title="Reload file (⌘R)">
                <svg viewBox="0 0 16 16"><path d="M13.5 8a5.5 5.5 0 1 1-1.1-3.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><polyline points="12.4,1.7 12.4,4.7 9.4,4.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="tb-btn" id="btn-export" onclick="toggleExportPopover(event)" title="Export / Share">
                <svg viewBox="0 0 16 16"><polyline points="4,6 8,2 12,6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="2" x2="8" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M3,10 L3,14 L13,14 L13,10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="tb-btn" id="btn-settings" onclick="toggleSettingsPanel()" title="Settings (⌘,)">
                <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8,1.5 L8,3.5 M8,12.5 L8,14.5 M1.5,8 L3.5,8 M12.5,8 L14.5,8 M3.2,3.2 L4.6,4.6 M11.4,11.4 L12.8,12.8 M12.8,3.2 L11.4,4.6 M4.6,11.4 L3.2,12.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
    </div>

    <!-- Export popover -->
    <div id="export-popover" class="export-popover" style="display:none">
        <button onclick="doExportPDF()"><svg viewBox="0 0 16 16"><rect x="2" y="1" width="12" height="14" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="5" x2="11" y2="5" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="11" x2="9" y2="11" stroke="currentColor" stroke-width="1.3"/></svg> Export as PDF</button>
        <div class="popover-divider"></div>
        <button onclick="doShare()"><svg viewBox="0 0 16 16"><circle cx="12" cy="3" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="4" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="12" cy="13" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="5.8" y1="7" x2="10.2" y2="4" stroke="currentColor" stroke-width="1.3"/><line x1="5.8" y1="9" x2="10.2" y2="12" stroke="currentColor" stroke-width="1.3"/></svg> Share...</button>
    </div>

    <!-- Settings panel (modal overlay) -->
    <div id="settings-overlay" class="settings-overlay" style="display:none" onclick="if(event.target===this)closeSettingsPanel()">
        <div class="settings-panel">
            <div class="settings-header">
                <span>Settings</span>
                <button class="settings-close" onclick="closeSettingsPanel()">&times;</button>
            </div>
            <div class="settings-body" id="settings-body"></div>
        </div>
    </div>

    <!-- Search bar -->
    <div id="search-bar" class="search-bar" style="display:none">
        <div class="search-inner">
            <svg class="search-icon" viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <input id="search-input" type="text" placeholder="Search…" autocomplete="off" spellcheck="false">
            <span id="search-count" class="search-count"></span>
            <button class="search-nav-btn" onclick="searchNav(-1)" title="Previous (⇧Enter)">&#x25B2;</button>
            <button class="search-nav-btn" onclick="searchNav(1)" title="Next (Enter)">&#x25BC;</button>
            <button class="search-close-btn" onclick="closeSearch()">&times;</button>
        </div>
    </div>

    <!-- TOC Sidebar -->
    <aside id="toc-sidebar" class="toc-sidebar">
        <div class="toc-header"><span class="toc-title">Table of Contents</span></div>
        <nav id="toc-list" class="toc-list"></nav>
        <div id="bookmark-section" class="file-list-section" style="display:none">
            <div class="toc-header"><span class="toc-title">Bookmarks</span></div>
            <nav id="bookmark-list" class="toc-list"></nav>
        </div>
        <div id="file-list-section" class="file-list-section" style="display:none">
            <div class="toc-header">
                <span class="toc-title">Files</span>
                <button class="files-parent-btn" id="files-parent-btn" onclick="goToParentFolder()" title="Parent folder">
                    <svg viewBox="0 0 16 16" width="12" height="12"><path d="M4 9 L8 5 L12 9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <nav id="file-list" class="toc-list"></nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <article id="content" class="content"></article>
        <footer id="status-bar" class="status-bar"><span id="word-count"></span></footer>
    </div>

    <div id="image-overlay" class="image-overlay" onclick="closeImageOverlay()"><img src="" alt=""></div>

    <script src="app.js"></script>
</body>
</html>
